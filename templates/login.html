<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン - タスク管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Meiryo",sans-serif;background:#eef1f5;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);
      padding:40px;width:100%;max-width:380px}
h1{font-size:20px;color:#1a252f;margin-bottom:8px}
.subtitle{font-size:13px;color:#666;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1px solid #d0d7de;border-radius:6px;
      font-size:14px;margin-bottom:16px;outline:none;transition:border-color .15s}
input:focus{border-color:#3498db}
.btn{width:100%;padding:11px;background:#3498db;color:#fff;border:none;
     border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:#2980b9}
.link{text-align:center;margin-top:16px;font-size:13px;color:#666}
.link a{color:#3498db;text-decoration:none}
.flash{background:#ffeaea;border:1px solid #f5c6cb;color:#721c24;
       border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <h1>ログイン</h1>
  <p class="subtitle">タスク管理アプリへようこそ</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <label>メールアドレス</label>
    <input type="email" name="email" required autofocus>
    <label>パスワード</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn">ログイン</button>
  </form>
  <p class="link">アカウントをお持ちでない方は <a href="/signup">新規登録</a></p>
</div>
</body>
</html>
