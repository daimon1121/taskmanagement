<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="login_title">ログイン - タスク管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Meiryo",sans-serif;background:#eef1f5;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);
      padding:40px;width:100%;max-width:380px}
h1{font-size:20px;color:#1a252f;margin-bottom:8px}
.subtitle{font-size:13px;color:#666;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1px solid #d0d7de;border-radius:6px;
      font-size:14px;margin-bottom:16px;outline:none;transition:border-color .15s}
input:focus{border-color:#3498db}
.btn{width:100%;padding:11px;background:#3498db;color:#fff;border:none;
     border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:#2980b9}
.link{text-align:center;margin-top:16px;font-size:13px;color:#666}
.link a{color:#3498db;text-decoration:none}
.flash{background:#ffeaea;border:1px solid #f5c6cb;color:#721c24;
       border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.lang-bar{text-align:right;margin-bottom:16px}
.lang-bar select{font-size:12px;border:1px solid #d0d7de;border-radius:4px;padding:3px 6px;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <div class="lang-bar">
    <select id="lang-sel" onchange="setLang(this.value)">
      <option value="ja">🇯🇵 日本語</option>
      <option value="en">🇺🇸 English</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
    </select>
  </div>
  <h1 data-i18n="login_h1">ログイン</h1>
  <p class="subtitle" data-i18n="login_sub">タスク管理アプリへようこそ</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <label data-i18n="email_label">メールアドレス</label>
    <input type="email" name="email" required autofocus>
    <label data-i18n="password_label">パスワード</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn" data-i18n="login_btn">ログイン</button>
  </form>
  <p class="link"><span data-i18n="no_account">アカウントをお持ちでない方は</span> <a href="/signup" data-i18n="signup_link">新規登録</a></p>
</div>
<script>
const L={
  ja:{login_h1:"ログイン",login_sub:"タスク管理アプリへようこそ",email_label:"メールアドレス",password_label:"パスワード",login_btn:"ログイン",no_account:"アカウントをお持ちでない方は",signup_link:"新規登録",login_title:"ログイン - タスク管理"},
  en:{login_h1:"Login",login_sub:"Welcome to Task Manager",email_label:"Email",password_label:"Password",login_btn:"Login",no_account:"Don't have an account?",signup_link:"Sign up",login_title:"Login - Task Manager"},
  zh:{login_h1:"登录",login_sub:"欢迎使用任务管理",email_label:"电子邮件",password_label:"密码",login_btn:"登录",no_account:"还没有账户？",signup_link:"注册",login_title:"登录 - 任务管理"},
  ko:{login_h1:"로그인",login_sub:"작업 관리 앱에 오신 것을 환영합니다",email_label:"이메일",password_label:"비밀번호",login_btn:"로그인",no_account:"계정이 없으신가요?",signup_link:"회원가입",login_title:"로그인 - 작업 관리"},
  es:{login_h1:"Iniciar sesión",login_sub:"Bienvenido al gestor de tareas",email_label:"Correo electrónico",password_label:"Contraseña",login_btn:"Iniciar sesión",no_account:"¿No tienes cuenta?",signup_link:"Registrarse",login_title:"Iniciar sesión - Gestión de tareas"},
  fr:{login_h1:"Connexion",login_sub:"Bienvenue sur le gestionnaire de tâches",email_label:"E-mail",password_label:"Mot de passe",login_btn:"Connexion",no_account:"Pas encore de compte ?",signup_link:"S'inscrire",login_title:"Connexion - Gestion des tâches"},
};
let _lang=localStorage.getItem("tf_lang")||"ja";
function applyLang(){
  const d=L[_lang]||L.ja;
  document.documentElement.lang=_lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=d[el.dataset.i18n]||el.textContent);
  document.title=d.login_title||document.title;
  document.getElementById("lang-sel").value=_lang;
}
function setLang(l){_lang=l;localStorage.setItem("tf_lang",l);applyLang();}
applyLang();
</script>
</body>
</html>
