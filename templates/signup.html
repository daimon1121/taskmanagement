<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 - タスク管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Meiryo",sans-serif;background:#eef1f5;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);
      padding:40px;width:100%;max-width:380px}
h1{font-size:20px;color:#1a252f;margin-bottom:8px}
.subtitle{font-size:13px;color:#666;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1px solid #d0d7de;border-radius:6px;
      font-size:14px;margin-bottom:16px;outline:none;transition:border-color .15s}
input:focus{border-color:#3498db}
.btn{width:100%;padding:11px;background:#2ecc71;color:#fff;border:none;
     border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:#27ae60}
.link{text-align:center;margin-top:16px;font-size:13px;color:#666}
.link a{color:#3498db;text-decoration:none}
.flash{background:#ffeaea;border:1px solid #f5c6cb;color:#721c24;
       border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.note{font-size:12px;color:#888;margin-top:12px;text-align:center}
.lang-bar{text-align:right;margin-bottom:16px}
.lang-bar select{font-size:12px;border:1px solid #d0d7de;border-radius:4px;padding:3px 6px;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <div class="lang-bar">
    <select id="lang-sel" onchange="setLang(this.value)">
      <option value="ja">🇯🇵 日本語</option>
      <option value="en">🇺🇸 English</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
    </select>
  </div>
  <h1 data-i18n="h1">新規登録</h1>
  <p class="subtitle" data-i18n="sub">無料プランで今すぐ始めよう</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <label data-i18n="email_label">メールアドレス</label>
    <input type="email" name="email" required autofocus>
    <label data-i18n="password_label">パスワード</label>
    <input type="password" name="password" required minlength="6">
    <button type="submit" class="btn" data-i18n="btn">無料で始める</button>
  </form>
  <p class="note" data-i18n="note">無料プラン：タスク10件まで</p>
  <p class="link"><span data-i18n="has_account">すでにアカウントをお持ちの方は</span> <a href="/login" data-i18n="login_link">ログイン</a></p>
</div>
<script>
const L={
  ja:{h1:"新規登録",sub:"無料プランで今すぐ始めよう",email_label:"メールアドレス",password_label:"パスワード",btn:"無料で始める",note:"無料プラン：タスク10件まで",has_account:"すでにアカウントをお持ちの方は",login_link:"ログイン"},
  en:{h1:"Sign Up",sub:"Start for free today",email_label:"Email",password_label:"Password",btn:"Get Started Free",note:"Free plan: up to 10 tasks",has_account:"Already have an account?",login_link:"Login"},
  zh:{h1:"注册",sub:"立即免费开始",email_label:"电子邮件",password_label:"密码",btn:"免费开始",note:"免费计划：最多10个任务",has_account:"已有账户？",login_link:"登录"},
  ko:{h1:"회원가입",sub:"지금 바로 무료로 시작하세요",email_label:"이메일",password_label:"비밀번호",btn:"무료로 시작하기",note:"무료 플랜：작업 최대 10건",has_account:"이미 계정이 있으신가요?",login_link:"로그인"},
  es:{h1:"Registrarse",sub:"Comienza gratis hoy",email_label:"Correo electrónico",password_label:"Contraseña",btn:"Empezar gratis",note:"Plan gratuito: hasta 10 tareas",has_account:"¿Ya tienes cuenta?",login_link:"Iniciar sesión"},
  fr:{h1:"S'inscrire",sub:"Commencez gratuitement dès aujourd'hui",email_label:"E-mail",password_label:"Mot de passe",btn:"Commencer gratuitement",note:"Plan gratuit : jusqu'à 10 tâches",has_account:"Vous avez déjà un compte ?",login_link:"Connexion"},
};
let _lang=localStorage.getItem("tf_lang")||"ja";
function applyLang(){
  const d=L[_lang]||L.ja;
  document.documentElement.lang=_lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=d[el.dataset.i18n]||el.textContent);
  document.getElementById("lang-sel").value=_lang;
}
function setLang(l){_lang=l;localStorage.setItem("tf_lang",l);applyLang();}
applyLang();
</script>
</body>
</html>
