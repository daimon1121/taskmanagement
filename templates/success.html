<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アップグレード完了 - タスク管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Meiryo",sans-serif;background:#eef1f5;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);
      padding:48px 40px;width:100%;max-width:400px;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:22px;color:#1a252f;margin-bottom:10px}
p{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6}
.btn{display:inline-block;padding:12px 32px;background:#3498db;color:#fff;
     border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;transition:background .15s}
.btn:hover{background:#2980b9}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Proプランへようこそ！</h1>
  <p>アップグレードが完了しました。<br>タスクを無制限に作成できます。</p>
  <a href="/" class="btn">タスク管理を始める</a>
</div>
</body>
</html>
