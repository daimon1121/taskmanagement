<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アップグレード完了 - タスク管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Meiryo",sans-serif;background:#eef1f5;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);
      padding:48px 40px;width:100%;max-width:400px;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:22px;color:#1a252f;margin-bottom:10px}
p{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6}
.btn{display:inline-block;padding:12px 32px;background:#3498db;color:#fff;
     border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;transition:background .15s}
.btn:hover{background:#2980b9}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1 data-i18n="h1">Proプランへようこそ！</h1>
  <p data-i18n="desc">アップグレードが完了しました。<br>タスクを無制限に作成できます。</p>
  <a href="/" class="btn" data-i18n="btn">タスク管理を始める</a>
</div>
<script>
const L={
  ja:{h1:"Proプランへようこそ！",desc:"アップグレードが完了しました。タスクを無制限に作成できます。",btn:"タスク管理を始める"},
  en:{h1:"Welcome to Pro!",desc:"Your upgrade is complete.\nYou can now create unlimited tasks.",btn:"Start Task Manager"},
  zh:{h1:"欢迎加入 Pro！",desc:"升级完成。\n您现在可以创建无限任务。",btn:"开始任务管理"},
  ko:{h1:"Pro 플랜에 오신 것을 환영합니다！",desc:"업그레이드가 완료되었습니다.\n작업을 무제한으로 만들 수 있습니다。",btn:"작업 관리 시작"},
  es:{h1:"¡Bienvenido a Pro!",desc:"Tu actualización está completa.\nAhora puedes crear tareas ilimitadas.",btn:"Iniciar gestor de tareas"},
  fr:{h1:"Bienvenue dans Pro !",desc:"Votre mise à niveau est terminée.\nVous pouvez maintenant créer des tâches illimitées.",btn:"Démarrer le gestionnaire de tâches"},
};
const _lang=localStorage.getItem("tf_lang")||"ja";
const d=L[_lang]||L.ja;
document.documentElement.lang=_lang;
document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=d[el.dataset.i18n]||el.textContent);
</script>
</body>
</html>
